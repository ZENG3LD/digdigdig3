# wasm-bindgen test runner for headless browser tests.
#
# `cargo test --target wasm32-unknown-unknown` delegates to dig2-wasm-test,
# which auto-detects Chrome/Edge/Firefox, downloads the matching WebDriver,
# spawns headless browser, runs tests, returns exit code. No PATH setup.
#
# Install: `cargo install dig2browser` (provides dig2-wasm-test binary).
[target.wasm32-unknown-unknown]
runner = "dig2-wasm-test"

# WASM_BINDGEN_TEST_TIMEOUT: default is 20s which is too short for station
# tests that poll live WebSocket streams for up to 15s per test.
# Station smoke tests need ~120s (existing tests × ~27s average including WS wait).
#
# wasm_e2e_matrix runs 4 test groups in one session (wasm is single-threaded):
#   Group A (Binance/Bybit/OKX, full 9 streams): ~465s
#   Group B (HyperLiquid/Dydx/Lighter, full 9 streams): ~465s
#   Group C (Gemini/CryptoCom/Bitfinex, 4 core streams): ~210s
#   Group D (BingX/Upbit, 4 core streams): ~140s
#   Total: ~1280s + driver startup overhead.
# Set 1800s (30min) to cover the full 4-group matrix with headroom.
# Per-group runs complete in ~465s each — use individual test filtering if
# the full session is too slow for iterative development.
[env]
WASM_BINDGEN_TEST_TIMEOUT = { value = "1800", force = true }
