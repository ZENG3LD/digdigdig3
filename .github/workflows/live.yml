name: Live API Tests

on:
  schedule:
    - cron: '0 0 * * 0'  # weekly Sunday 00:00 UTC
  workflow_dispatch:

env:
  RUSTFLAGS: "-D warnings"

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --tests
      - name: Run live tests (--ignored)
        run: cargo test --release --tests -- --ignored --nocapture --test-threads=4
        timeout-minutes: 30
      - name: Run deep_smoke
        run: |
          cargo build --example deep_smoke --release
          ./target/release/examples/deep_smoke 2>&1 | tee deep_smoke_ci.txt
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: live-validation-${{ github.run_id }}
          path: |
            data/validation_snapshot.json
            deep_smoke_ci.txt
