syntax = "proto3";
package dig3;

// ── LiveEvents ────────────────────────────────────────────────────────────────

service LiveEvents {
    rpc Subscribe(SubscribeRequest) returns (stream EventMessage);
}

message SubscribeRequest {
    string exchange    = 1;
    string account     = 2;
    string symbol      = 3;
    string stream_kind = 4;
}

message EventMessage {
    int64  timestamp_ms  = 1;
    string event_type    = 2;
    bytes  payload_json  = 3;
}

// ── RestProxy ─────────────────────────────────────────────────────────────────

service RestProxy {
    rpc GetTicker   (GetTickerRequest)    returns (GetTickerResponse);
    rpc GetKlines   (GetKlinesRequest)    returns (GetKlinesResponse);
    rpc GetOrderbook(GetOrderbookRequest) returns (GetOrderbookResponse);
}

message GetTickerRequest    { string exchange = 1; string account = 2; string symbol = 3; }
message GetTickerResponse   { bytes ticker_json = 1; }

message GetKlinesRequest    {
    string exchange  = 1;
    string account   = 2;
    string symbol    = 3;
    string interval  = 4;
    int32  limit     = 5;
}
message GetKlinesResponse   { bytes klines_json = 1; }

message GetOrderbookRequest { string exchange = 1; string account = 2; string symbol = 3; int32 depth = 4; }
message GetOrderbookResponse{ bytes orderbook_json = 1; }

// ── StorageRead ───────────────────────────────────────────────────────────────

service StorageRead {
    rpc ReadRange(ReadRangeRequest) returns (stream EventMessage);
}

message ReadRangeRequest {
    string exchange    = 1;
    string account     = 2;
    string symbol      = 3;
    string stream_kind = 4;
    int64  from_ms     = 5;
    int64  to_ms       = 6;
}

// ── Health ────────────────────────────────────────────────────────────────────

service Health {
    rpc Status(HealthRequest) returns (HealthResponse);
}

message HealthRequest {}

message HealthResponse {
    int64  uptime_secs          = 1;
    int32  connected_exchanges  = 2;
    int32  active_subscriptions = 3;
    repeated string capabilities_json = 4;
}
